name: Deploy Aether-0X Production Engine

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bundler Dependencies
        run: npm ci

      - name: Compile and Optimize Production Code Bundle
        run: npm run build

      - name: Setup GitHub Pages Environment Configurations
        uses: actions/configure-pages@v4

      - name: Package Distribution Directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Publish Live Subnets to Pages CDN
        id: deployment
        uses: actions/deploy-pages@v4
        
